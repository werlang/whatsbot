<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{metaTitle}}</title>
    <meta name="description" content="{{metaDescription}}">
    <link rel="canonical" href="{{webUrl}}{{canonicalPath}}">
    <link rel="stylesheet" href="/css/index.css">
    <script type="module" src="/js/root.js"></script>
</head>

<body>
    <main class="page-shell page-shell--gateway">
        <section class="hero hero--gateway">
            <span class="hero__eyebrow">WhatsBot</span>
            <h1>Routing session…</h1>
            <p>Opening the correct page for this browser.</p>
            <p class="hero__hint">If you already have a saved session id, WhatsBot will open the scheduler. Otherwise it will send you to the login flow.</p>
            <p class="hero__hint"><a href="/login">Open /login</a> if you want to create a new session manually.</p>
        </section>

        <noscript>
            <section class="panel panel--gateway">
                <p>JavaScript is required to route between the login and session pages.</p>
                <p><a href="/login">Go to /login</a></p>
            </section>
        </noscript>
    </main>
    {{{template-vars}}}
</body>

</html>
