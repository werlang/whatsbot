<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{metaTitle}}</title>
    <meta name="description" content="{{metaDescription}}">
    <link rel="canonical" href="{{webUrl}}{{canonicalPath}}">
    <link rel="stylesheet" href="/css/index.css">
    <script type="module" src="/js/root.js"></script>
</head>

<body>
    <div class="app-background" aria-hidden="true"></div>
    <main class="app-shell app-shell--gateway">
        <header class="app-topbar app-topbar--gateway">
            <a class="brand" href="/login" aria-label="Open WhatsBot login">
                <span class="brand__mark">W</span>
                <span class="brand__text">
                    <strong>WhatsBot</strong>
                    <span>WhatsApp scheduling</span>
                </span>
            </a>
        </header>

        <section class="hero hero--split hero--gateway">
            <div class="hero__content hero__content--gateway">
                <span class="hero__eyebrow">WhatsBot</span>
                <h1>Opening...</h1>
                <p class="hero__lede">One moment.</p>
                <p class="hero__hint"><a href="/login">Open login</a></p>
            </div>
        </section>

        <noscript>
            <section class="panel panel--gateway">
                <div class="panel__header">
                    <div>
                        <span class="panel__kicker">JavaScript required</span>
                        <h2>Open login</h2>
                    </div>
                </div>
                <p><a class="button button--ghost" href="/login">Go to login</a></p>
            </section>
        </noscript>
    </main>
    {{{template-vars}}}
</body>

</html>
